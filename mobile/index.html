<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#3949AB" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Al Assile" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="description" content="Al Assile Mobile Sales — Field POS for date products" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-192.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet" />
    <title>Al Assile Mobile</title>
    <style>
      html, body, #root {
        height: 100%;
        margin: 0;
        padding: 0;
        background: #F0F2F5;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      #boot-splash {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(180deg, #0d1108 0%, #080c14 60%);
        color: #D4A574;
        z-index: 9999;
        transition: opacity 180ms ease;
      }
      #boot-splash.hidden {
        opacity: 0;
        pointer-events: none;
      }
      .boot-splash__content {
        text-align: center;
        font-family: Inter, sans-serif;
      }
      .boot-splash__spinner {
        width: 42px;
        height: 42px;
        margin: 0 auto 14px;
        border-radius: 9999px;
        border: 3px solid rgba(212,165,116,0.18);
        border-top-color: #D4A574;
        animation: boot-spin 0.9s linear infinite;
      }
      .boot-splash__label {
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.04em;
      }
      @keyframes boot-spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      /* Prevent iOS bounce scroll */
      body {
        overscroll-behavior: none;
        -webkit-overflow-scrolling: touch;
      }
    </style>
  </head>
  <body>
    <div id="boot-splash">
      <div class="boot-splash__content">
        <div class="boot-splash__spinner"></div>
        <div class="boot-splash__label">Loading Al Assile</div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
