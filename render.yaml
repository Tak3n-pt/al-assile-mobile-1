services:
  - type: web
    name: al-assile-mobile
    runtime: docker
    plan: starter
    region: frankfurt
    disk:
      name: al-assile-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: SYNC_API_KEY
        generateValue: true
      - key: NODE_ENV
        value: production
